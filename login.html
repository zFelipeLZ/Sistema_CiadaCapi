<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cia da Capivara Turismo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="login-page" style="display:flex">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">🦔</div>
        <h1>Cia da Capivara Turismo</h1>
        <p>Painel Administrativo</p>
      </div>
      <div id="login-error" class="login-error"></div>
      <form id="login-form">
        <div class="form-group" style="margin-bottom:16px">
          <label>Usuário</label>
          <input type="text" id="login-username" placeholder="Digite seu usuário" required>
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">🔐 Entrar</button>
      </form>
      <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--text-muted)">
        <p>Contas de teste:</p>
        <p>admin / admin123 &nbsp;|&nbsp; recepcionista / recepcao123</p>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      DB.seed();
      if (Auth.init()) { window.location.href = 'index.html'; return; }
      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const u = document.getElementById('login-username').value.trim();
        const p = document.getElementById('login-password').value;
        if (Auth.login(u, p)) {
          window.location.href = 'index.html';
        } else {
          const err = document.getElementById('login-error');
          err.style.display = 'block';
          err.textContent = '❌ Usuário ou senha incorretos';
        }
      });
    });
  </script>
</body>
</html>
