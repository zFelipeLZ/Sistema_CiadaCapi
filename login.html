<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cia da Capivara Turismo</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div id="login-page" style="display:flex">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-container">
          <img src="logo.png" alt="Cia da Capivara Logo" class="login-logo-img">
        </div>
        <h1>Cia da Capivara Turismo</h1>
        <p>Painel Administrativo</p>
      </div>
      <div id="login-error" class="login-error"></div>
      <form id="login-form">
        <div class="form-group" style="margin-bottom:16px">
          <label>Usuário</label>
          <input type="text" id="login-username" placeholder="Digite seu usuário" required>
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;display:flex;align-items:center;gap:8px">
          <i data-lucide="lock" style="width: 18px; height: 18px;"></i>
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      DB.seed();
      lucide.createIcons();
      if (Auth.init()) { window.location.href = 'index.html'; return; }
      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const u = document.getElementById('login-username').value.trim();
        const p = document.getElementById('login-password').value;
        if (Auth.login(u, p)) {
          window.location.href = 'index.html';
        } else {
          const err = document.getElementById('login-error');
          err.style.display = 'block';
          err.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><i data-lucide="alert-circle" style="width:18px;height:18px;flex-shrink:0;"></i><span>Usuário ou senha incorretos</span></div>';
          lucide.createIcons();
        }
      });
    });
  </script>
</body>

</html>
