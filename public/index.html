<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    // Capturador de erros do navegador em tempo real para diagnóstico
    window.onerror = function(message, source, lineno, colno, error) {
      fetch('/api/debug/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          error: message,
          stack: error ? error.stack : (source + ':' + lineno + ':' + colno)
        })
      });
    };
    window.addEventListener('unhandledrejection', function(event) {
      fetch('/api/debug/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          error: 'Unhandled Promise Rejection: ' + event.reason,
          stack: event.reason ? event.reason.stack : ''
        })
      });
    });
    // Interceptar console.error
    const _originalConsoleError = console.error;
    console.error = function(...args) {
      _originalConsoleError.apply(console, args);
      fetch('/api/debug/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          error: args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '),
          stack: new Error().stack
        })
      });
    };
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cia da Capivara Turismo — Painel Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="logo.png">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA Service Worker ativo!', reg.scope))
          .catch(err => console.error('Erro PWA Service Worker:', err));
      });
    }
  </script>

</head>
