<!-- Fornecedores Page Template -->
<div class="page-header">
  <div><h2><i data-lucide="handshake" style="vertical-align:middle;margin-right:8px;color:var(--accent)"></i>Fornecedores & Agentes</h2><p>Gerencie guias, motoristas, hotéis e outros fornecedores operacionais</p></div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-secondary" onclick="Exportar.run('providers')" style="display:flex;align-items:center;gap:6px"><i data-lucide="download" style="width:16px;height:16px"></i> Exportar</button>
    <button class="btn btn-primary" onclick="Fornecedores.openEmpForm()" style="display:flex;align-items:center;gap:6px"><i data-lucide="plus" style="width:16px;height:16px"></i> Novo Fornecedor</button>
  </div>
</div>

<div class="grid-2">
  <!-- Painel de Fornecedores -->
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px;align-items:center">
      <h3 style="font-size:16px;font-weight:700">Fornecedores</h3>
      <input type="text" placeholder="Buscar..." oninput="Fornecedores.renderEmployees(this.value)" style="padding:6px 12px;width:180px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text-main)">
    </div>
    <div style="display:grid;grid-template-columns:1fr;gap:16px" id="emp-grid"></div>
  </div>

  <!-- Painel de Tarefas -->
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px;align-items:center">
      <h3 style="font-size:16px;font-weight:700">Painel de Escalas/Missões</h3>
      <div style="display:flex;gap:10px">
        <button class="btn btn-sm btn-secondary" onclick="Exportar.run('tasks')" style="display:flex;align-items:center;gap:4px"><i data-lucide="download" style="width:12px;height:12px"></i> Exportar</button>
        <button class="btn btn-sm btn-primary" onclick="Fornecedores.openTaskForm()" style="display:flex;align-items:center;gap:4px"><i data-lucide="plus" style="width:12px;height:12px"></i> Nova Escala</button>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Escala / Serviço</th><th>Fornecedor</th><th>Partida / Destino</th><th>Data / Hora</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody id="tasks-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Novo/Editar Fornecedor -->
<div class="modal-overlay" id="emp-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="emp-modal-title">Novo Fornecedor</div><button class="modal-close" onclick="closeModal('emp-modal')">✕</button></div>
    <div class="modal-body">
      <form id="emp-form" onsubmit="event.preventDefault();Fornecedores.saveEmp()">
        <div class="form-grid">
          <div class="form-group full"><label>Nome *</label><input name="name" placeholder="Ex: Nome da Empresa ou Profissional" required></div>
          <div class="form-group full">
            <label>Função / Tipo de Fornecedor *</label>
            <select name="role" id="emp-form-role" onchange="Fornecedores.handleRoleChange()" required>
              <option value="guia">Guia/Condutor</option>
              <option value="motorista">Motorista</option>
              <option value="hotel">Hotel</option>
              <option value="outros">Outros</option>
            </select>
          </div>
          
          <!-- Campo dinâmico para Motorista: Selecionar Carro -->
          <div class="form-group full" id="group-car" style="display:none">
            <label>Carro Cadastrado *</label>
            <select name="carId" id="emp-sel-car"></select>
          </div>
 
          <!-- Campo dinâmico para Hotel: Local -->
          <div class="form-group full" id="group-location" style="display:none">
            <label>Local / Endereço *</label>
            <input name="hotelLocation" placeholder="Ex: Av. Beira Rio, 100 - Centro">
          </div>
 
          <div class="form-group"><label>Telefone</label><input name="phone" placeholder="Ex: (11) 99999-9999"></div>
          <div class="form-group"><label>Email</label><input name="email" type="email" placeholder="Ex: fornecedor@email.com"></div>
          <div class="form-group full"><label>Observações</label><textarea name="notes" placeholder="Detalhes, contatos adicionais, termos de contrato..." rows="2"></textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('emp-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="Fornecedores.saveEmp()" style="display:flex;align-items:center;gap:6px"><i data-lucide="save" style="width:16px;height:16px"></i> Salvar</button>
    </div>
  </div>
</div>
 
<!-- Modal: Nova/Editar Tarefa -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="task-modal-title">Nova Escala</div><button class="modal-close" onclick="closeModal('task-modal')">✕</button></div>
    <div class="modal-body">
      <form id="task-form" onsubmit="event.preventDefault();Fornecedores.saveTask()">
        <div class="form-grid">
          <div class="form-group full"><label>Fornecedor *</label><select name="employeeId" id="task-sel-emp" required></select></div>
          <div class="form-group full"><label>Título da Escala *</label><input name="title" placeholder="Ex: Translado Aeroporto, Trilha Arqueológica" required></div>
          <div class="form-group"><label>Partida/Origem</label><input name="departure" placeholder="Ex: Agência, Hotel"></div>
          <div class="form-group"><label>Destino/Local</label><input name="destination" placeholder="Ex: Aeroporto"></div>
          <div class="form-group"><label>Data</label><input name="date" type="date" required></div>
          <div class="form-group"><label>Horário</label><input name="time" type="time"></div>
          <div class="form-group"><label>Status</label><select name="status"><option value="pending">Pendente</option><option value="in_progress">Em Andamento</option><option value="done">Concluído</option></select></div>
          <div class="form-group full"><label>Descrição / Instruções</label><textarea name="description" rows="3"></textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('task-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="Fornecedores.saveTask()" style="display:flex;align-items:center;gap:6px"><i data-lucide="save" style="width:16px;height:16px"></i> Salvar</button>
    </div>
  </div>
</div>
