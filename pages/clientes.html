<!-- Clientes Page Template -->
<div class="page-header">
  <div><h2>👥 Clientes</h2><p>Gerencie o cadastro de clientes</p></div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-secondary" onclick="Exportar.run('clients')">📤 Exportar</button>
    <button class="btn btn-primary" onclick="Clientes.openForm()">+ Novo Cliente</button>
  </div>
</div>
<div class="filters-bar">
  <div class="filter-group"><label>Buscar</label><input type="text" id="clients-search" placeholder="Nome, CPF, email..." oninput="Clientes.renderList(this.value)"></div>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Email</th><th>Viagens</th><th>Ações</th></tr></thead>
      <tbody id="clients-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal: Novo/Editar Cliente -->
<div class="modal-overlay" id="client-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="client-modal-title">Novo Cliente</div><button class="modal-close" onclick="closeModal('client-modal')">✕</button></div>
    <div class="modal-body">
      <form id="client-form" onsubmit="event.preventDefault();Clientes.save()">
        <div class="form-grid">
          <div class="form-group"><label>Nome *</label><input name="name" required></div>
          <div class="form-group"><label>CPF</label><input name="cpf" placeholder="000.000.000-00"></div>
          <div class="form-group"><label>Telefone</label><input name="phone"></div>
          <div class="form-group"><label>Email</label><input name="email" type="email"></div>
          <div class="form-group"><label>Endereço</label><input name="address"></div>
          <div class="form-group"><label>Data de Nascimento</label><input name="birthdate" type="date"></div>
          <div class="form-group full"><label>Observações</label><textarea name="notes" rows="3"></textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('client-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="Clientes.save()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Ver Cliente -->
<div class="modal-overlay" id="client-view-modal">
  <div class="modal modal-lg">
    <div class="modal-header"><div class="modal-title">Detalhes do Cliente</div><button class="modal-close" onclick="closeModal('client-view-modal')">✕</button></div>
    <div class="modal-body" id="client-view-body"></div>
  </div>
</div>
