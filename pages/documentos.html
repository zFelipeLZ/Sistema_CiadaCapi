<!-- Documentos Page Template -->
<div class="page-header">
  <div><h2>📎 Gestão de Documentos</h2><p>Anexe PDFs, comprovantes e vouchers</p></div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-primary" onclick="Documentos.openUpload()">+ Anexar Documento</button>
  </div>
</div>

<div class="filters-bar" style="margin-bottom:20px">
  <div class="filter-group"><label>Buscar</label><input type="text" id="docs-search" placeholder="Nome do arquivo ou vínculo..." oninput="Documentos.renderList(this.value)" style="width:300px"></div>
</div>

<div class="grid-3" id="docs-grid"></div>

<!-- Modal: Upload de Documentos -->
<div class="modal-overlay" id="doc-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Anexar Documento(s)</div><button class="modal-close" onclick="closeModal('doc-modal')">✕</button></div>
    <div class="modal-body">
      <form id="doc-form" onsubmit="event.preventDefault();Documentos.save()">
        <div class="form-grid">
          <div class="form-group full"><label>Vincular a (Opcional)</label><select id="doc-rel-sel"></select></div>
          <div class="form-group full">
            <label>Selecione os Arquivos (PDF, Imagens, Word)</label>
            <div style="border:2px dashed var(--border2);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;background:var(--bg-card2);transition:var(--transition)" onclick="document.getElementById('doc-file-input').click()" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">
              <div style="font-size:32px;margin-bottom:12px">📤</div>
              <div style="font-weight:600">Clique para selecionar arquivos</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Tamanho máximo recomendado: 5MB por arquivo</div>
            </div>
            <input type="file" id="doc-file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.doc,.docx" style="display:none" onchange="Documentos.handleFile(this)">
          </div>
          <div class="form-group full" id="doc-upload-preview"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('doc-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="Documentos.save()">💾 Enviar Arquivos</button>
    </div>
  </div>
</div>
